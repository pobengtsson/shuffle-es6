name: Pull Request CI

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: pull-request-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out PR merge ref
        uses: actions/checkout@v4
        with:
          # Validate the synthetic merge commit, not the raw PR head,
          # so build/test run against the PR on top of the current main tip.
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 24.10.0

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
